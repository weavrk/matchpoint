<!DOCTYPE html>
<html>
<head>
  <title>Worker Photos Review - Cloudinary Processed</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #f5f5f5; }
    h2 { margin-top: 40px; border-bottom: 2px solid #333; padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
    .portrait {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding: 8px;
      border-radius: 8px;
    }
    .portrait img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }
    .portrait span { font-size: 10px; color: #666; margin-top: 4px; text-align: center; }
    .section { margin-bottom: 40px; }
    .stats { background: #333; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Worker Photos - Cloudinary Processed (Local Files)</h1>
  <div class="stats" id="stats">Loading...</div>

  <div class="section">
    <h2>Male Workers (93 photos)</h2>
    <div class="grid" id="males"></div>
  </div>

  <div class="section">
    <h2>Female Workers (516 photos)</h2>
    <div class="grid" id="females"></div>
  </div>

  <script>
    const MALE_COUNT = 93;
    const FEMALE_COUNT = 516;
    const BASE_PATH = '../web/public/images/avatars';

    function render() {
      document.getElementById('stats').innerHTML = `
        <strong>Total Photos:</strong> ${MALE_COUNT + FEMALE_COUNT} |
        <strong>Male:</strong> ${MALE_COUNT} |
        <strong>Female:</strong> ${FEMALE_COUNT} |
        <strong>Source:</strong> Cloudinary face-detected, 400x400
      `;

      // Render males
      const malesGrid = document.getElementById('males');
      let malesHtml = '';
      for (let i = 1; i <= MALE_COUNT; i++) {
        const filename = String(i).padStart(3, '0') + '.jpg';
        malesHtml += `
          <div class="portrait">
            <img src="${BASE_PATH}/male/${filename}" alt="Male ${i}" onerror="this.src='https://via.placeholder.com/80?text=Error'">
            <span>${filename}</span>
          </div>
        `;
      }
      malesGrid.innerHTML = malesHtml;

      // Render females
      const femalesGrid = document.getElementById('females');
      let femalesHtml = '';
      for (let i = 1; i <= FEMALE_COUNT; i++) {
        const filename = String(i).padStart(3, '0') + '.jpg';
        femalesHtml += `
          <div class="portrait">
            <img src="${BASE_PATH}/female/${filename}" alt="Female ${i}" onerror="this.src='https://via.placeholder.com/80?text=Error'">
            <span>${filename}</span>
          </div>
        `;
      }
      femalesGrid.innerHTML = femalesHtml;
    }

    render();
  </script>
</body>
</html>
